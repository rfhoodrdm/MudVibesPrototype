logging: 
  level:
    com.example.mudvibe.logic: INFO 
    com.example.mudvibe.state: INFO

spring:
  datasource:
    url: jdbc:h2:mem:mudvibes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

text-formatting:
  room-description-line-length: 120
