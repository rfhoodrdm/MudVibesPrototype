
server:
  port: 10080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mudvibesproto
    driver-class-name: org.postgresql.Driver
    username: 
    password: 
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true 
  jpa:
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

text-formatting:
  room-description-line-length: 120

logging: 
  level:
    com.example.mudvibe: INFO 
